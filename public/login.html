<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Campus Lost & Found</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  

  <div class="login-wrapper">
    <div class="login-box">

      
      <div class="login-logo">
        <div class="icon-wrap">🎓</div>
        <h1><span>Campus</span> L&amp;F</h1>
        <p>Lost &amp; Found Portal — Please sign in</p>
      </div>

      
      <div class="demo-hint">
        <strong>Admin :</strong> admin / admin123<br>
        <strong>Student:</strong> student1 / pass123
      </div>

      
      <div class="form-group fade-up-1">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter your username"
          autocomplete="off"
        />
      </div>

      
      <div class="form-group fade-up-2">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
        />
      </div>

      
      <button class="btn btn-primary fade-up-3" onclick="handleLogin()">
        🔐 Sign In
      </button>

     
      <div class="alert alert-error" id="error-msg">
        ❌ Invalid username or password. Please try again.
      </div>

    </div>
  </div>

  
  <script>
    
    (function checkAlreadyLoggedIn() {
      const role = localStorage.getItem("role");
      if (role === "admin")   window.location.href = "admin.html";
      if (role === "student") window.location.href = "student.html";
    })(); 
    async function handleLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorBox = document.getElementById("error-msg");

      
      errorBox.style.display = "none";

      
      if (!username || !password) {
        errorBox.textContent = "⚠️ Please enter both username and password.";
        errorBox.style.display = "block";
        return;
      }

      try {
        
        const response = await fetch("/login", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ username, password })
            
        });

        const data = await response.json(); // Parse response

        if (response.ok && data.success) {
         
          localStorage.setItem("username", data.username);
          localStorage.setItem("role",     data.role);
          localStorage.setItem("fullName", data.fullName);

          
          if (data.role === "admin") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "student.html";
          }

        } else {
          
          errorBox.textContent = "❌ " + (data.error || "Login failed.");
          errorBox.style.display = "block";
        }

      } catch (err) {
        
        errorBox.textContent = "❌ Cannot connect to server. Is it running?";
        errorBox.style.display = "block";
        console.error("Login error:", err);
      }
    }

    
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>

</body>
</html>
